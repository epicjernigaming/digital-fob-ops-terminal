  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: linear-gradient(rgba(5,5,10,0.78), rgba(5,5,10,0.85)), url('background.jpg') center/cover no-repeat fixed;

      font-size: 1.45rem;
      position: relative;
      overflow-x: hidden;
    }
    
    .terminal { background: rgba(15,15,20,0.92); box-shadow: 0 0 35px #ff2222 inset; border: 18px solid #1a1a1a; border-image: linear-gradient(#ff2222, #00ff88) 1; border-radius: 8px; position: relative; overflow: hidden; z-index: 10; }
    .neon-red { color: #ff2222; text-shadow: none; }
    .neon-green { color: #00ff88; text-shadow: none; }
    
    .scanline::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(0,255,136,0.12) 50%); background-size: 100% 4px; pointer-events: none; animation: scan 2.5s linear infinite; z-index: 5; opacity: 0.7; }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px,2px); } 40% { transform: translate(-2px,-2px); } 60% { transform: translate(2px,2px); } 80% { transform: translate(2px,-2px); } 100% { transform: translate(0); } }
    .glitch-active { animation: glitch 0.3s linear; filter: hue-rotate(10deg) saturate(1.2); }
    
    .card { transition: all 0.3s cubic-bezier(0.4,0,0.2,1); border: 4px solid #222222; background: rgba(20,20,25,0.95); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 0 20px #ff2222; border-color: #00ff88; }
    
    #digital-rain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; opacity: 0.18; mix-blend-mode: screen; }
    
    /* Twitter widget styling */
    .twitter-timeline { border: none !important; background: transparent !important; }
  </style>
</head>
