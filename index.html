<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbc8f">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: #0a120a; 
      color: #99cc99;
      font-size: 1.2rem; /* Larger fonts */
    }
    
    .pip-boy {
      background: #0f1a0f;
      box-shadow: 0 0 40px #8fbc8f inset, 0 0 90px #8fbc8f, 0 0 30px rgba(0,0,0,0.95) inset;
      border: 22px solid #4a5f4a;
      border-image: linear-gradient(#8fbc8f, #4a5f4a) 1;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    
    .tactical-green { 
      color: #99cc99; 
      text-shadow: 0 0 10px #8fbc8f, 0 0 20px #8fbc8f;
      animation: phosphor-breath 4s ease-in-out infinite;
    }
    .alert-red { color: #ff7777; text-shadow: 0 0 12px #c94f4f; }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(143,188,143,0.35) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.2s linear infinite;
      z-index: 30;
      opacity: 0.92;
    }
    
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    @keyframes phosphor-breath {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.95; }
    }
    
    .card { 
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 5px solid #4a5f4a;
      background: #1a2a1a;
    }
    .card:hover { 
      transform: translateY(-5px); 
      box-shadow: 0 15px 30px rgba(143,188,143,0.6); 
    }
    
    button:active { transform: scale(0.95); }
  </style>
</head>
<body class="bg-[#0a120a] text-[#99cc99] scanline relative overflow-x-hidden">

  <!-- Sound Effects -->
  <audio id="click" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="beep" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="refresh" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>

  <nav class="bg-black/95 border-b-4 border-[#8fbc8f] p-4 flex items-center justify-between sticky top-0 z-50 pip-boy">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl alert-red"></i>
      <h1 class="text-3xl font-bold tracking-widest tactical-green">DIGITAL FOB</h1>
      <span class="text-xs bg-[#c94f4f] text-white px-3 py-1 rounded">OPS TERMINAL</span>
    </div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1">X POSTS</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
      <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-suitcase"></i> INVENTORY</a>
      <a onclick="showTab(5)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-radio"></i> RADIO</a>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto pip-boy p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 alert-red"></i>
      <h2 class="text-6xl mb-6 tactical-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#d1d5db]">Military • Simulation • RPG • Sports Sim Hangout<br>Real-time ops intel for the squad.</p>
      
      <div class="flex flex-wrap justify-center gap-8 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-lg">NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <span class="text-lg">X POSTS</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-lg">UPCOMING</span>
        </button>
        <button onclick="showTab(4)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-suitcase text-5xl"></i>
          <span class="text-lg">INVENTORY</span>
        </button>
        <button onclick="showTab(5)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-radio text-5xl"></i>
          <span class="text-lg">RADIO</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS -->
  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <button onclick="refreshNews()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </div>

  <!-- X POSTS -->
  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> X / RUMORS &amp; DEV POSTS</h2>
      <button onclick="refreshXPosts()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="x-last-refreshed" class="text-xs text-center mt-6 text-[#8fbc8f]/70"></div>
  </div>

  <!-- UPCOMING GAMES, INVENTORY, RADIO (kept from previous) -->

  <script>
    function playSound(id) {
      const audio = document.getElementById(id);
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }

    function showTab(n) {
      playSound('click');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

    const newsFeeds = [
      "https://www.pcgamer.com/rss/",
      "https://www.rockpapershotgun.com/feed",
      "https://www.ign.com/rss/articles/feed",
      "https://www.gamespot.com/feeds/news/",
      "https://www.eurogamer.net/feed",
      "https://www.polygon.com/rss/index.xml",
      "https://kotaku.com/rss",
      "https://www.gamesradar.com/feed",
      "https://www.thegamer.com/feed",
      "https://www.dualshockers.com/feed",
      "https://wccftech.com/feed/",
      "https://www.dsogaming.com/feed/",
      "https://steamcommunity.com/games/steam/news/rss"
    ];

    async function loadNews() {
      const container = document.getElementById('news-grid');
      container.innerHTML = `<div class="col-span-full text-center py-12 tactical-green">Loading live intel from all sources...</div>`;

      let allItems = [];
      for (let url of newsFeeds) {
        try {
          const res = await fetch(RSS_PROXY + encodeURIComponent(url));
          const data = await res.json();
          if (data.items) {
            allItems = allItems.concat(data.items.slice(0, 6).map(item => ({
              title: item.title,
              date: item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'Recent',
              url: item.link
            })));
          }
        } catch(e) {}
      }

      container.innerHTML = allItems.map(item => `
        <a href="${item.url}" target="_blank" class="card block bg-[#1f2a1f] p-5 rounded-3xl border border-[#8fbc8f] hover:border-[#c94f4f]">
          <div class="flex justify-between text-[10px] alert-red mb-2"><span>${item.date}</span></div>
          <h4 class="font-bold leading-tight text-sm">${item.title}</h4>
        </a>
      `).join('');
    }

    function refreshNews() { 
      playSound('refresh'); 
      loadNews(); 
    }

    // X Posts
    function loadXPosts() {
      const container = document.getElementById('x-grid');
      container.innerHTML = `
        <a class="twitter-timeline" href="https://twitter.com/wario64" data-theme="dark" data-height="620">Tweets by @wario64</a>
        <a class="twitter-timeline" href="https://twitter.com/BohemiaInteractive" data-theme="dark" data-height="620">Tweets by BohemiaInteractive</a>
        <a class="twitter-timeline" href="https://twitter.com/MADFINGER" data-theme="dark" data-height="620">Tweets by MADFINGER</a>
        <a class="twitter-timeline" href="https://twitter.com/GSCGameWorld" data-theme="dark" data-height="620">Tweets by GSCGameWorld</a>
        <a class="twitter-timeline" href="https://twitter.com/WarhorseStudios" data-theme="dark" data-height="620">Tweets by WarhorseStudios</a>
        <a class="twitter-timeline" href="https://twitter.com/TaleWorlds" data-theme="dark" data-height="620">Tweets by TaleWorlds</a>
        <a class="twitter-timeline" href="https://twitter.com/SaberInteractive" data-theme="dark" data-height="620">Tweets by SaberInteractive</a>
        <a class="twitter-timeline" href="https://twitter.com/GiantsSoftware" data-theme="dark" data-height="620">Tweets by GiantsSoftware</a>
        <a class="twitter-timeline" href="https://twitter.com/Astragon" data-theme="dark" data-height="620">Tweets by Astragon</a>
        <a class="twitter-timeline" href="https://twitter.com/Bethesda" data-theme="dark" data-height="620">Tweets by Bethesda</a>
        <a class="twitter-timeline" href="https://twitter.com/EA" data-theme="dark" data-height="620">Tweets by EA</a>
        <a class="twitter-timeline" href="https://twitter.com/OperatorDrewski" data-theme="dark" data-height="620">Tweets by OperatorDrewski</a>
        <a class="twitter-timeline" href="https://twitter.com/TaskForceGaming" data-theme="dark" data-height="620">Tweets by TaskForceGaming</a>
        <a class="twitter-timeline" href="https://twitter.com/GrayZoneWarfare" data-theme="dark" data-height="620">Tweets by GrayZoneWarfare</a>
        <a class="twitter-timeline" href="https://twitter.com/STALKER2" data-theme="dark" data-height="620">Tweets by STALKER2</a>
        <a class="twitter-timeline" href="https://twitter.com/40kWorldview" data-theme="dark" data-height="620">Tweets by 40kWorldview</a>
        <a class="twitter-timeline" href="https://twitter.com/Karmakut" data-theme="dark" data-height="620">Tweets by Karmakut</a>
        <a class="twitter-timeline" href="https://twitter.com/TheGamer" data-theme="dark" data-height="620">Tweets by TheGamer</a>
        <a class="twitter-timeline" href="https://twitter.com/PCGamer" data-theme="dark" data-height="620">Tweets by PCGamer</a>
        <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"><\/script>
      `;
      document.getElementById('x-last-refreshed').innerHTML = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    }

    function refreshXPosts() { 
      playSound('refresh'); 
      loadXPosts(); 
    }

    // Initialize
    loadNews();
    loadXPosts();
    showTab(0);
  </script>

  <!-- Sound Effects -->
  <audio id="click" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="beep" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="refresh" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
</body>
</html>
