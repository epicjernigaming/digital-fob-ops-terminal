<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00f0ff">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: #0c0c1a;
      color: #00f0ff;
      font-size: 1.25rem;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Enhanced cyberpunk background with subtle noise + vignette */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: 
        linear-gradient(rgba(255,102,0,0.03) 1px, transparent 1px),
        radial-gradient(circle at center, transparent 60%, rgba(0,0,0,0.85) 100%);
      background-size: 4px 4px;
      pointer-events: none;
      z-index: -1;
      animation: subtle-flicker 8s infinite alternate;
    }
    
    @keyframes subtle-flicker {
      0% { opacity: 0.92; }
      100% { opacity: 0.98; }
    }
    
    .replaced-terminal {
      background: #111122;
      box-shadow: 0 0 50px #00f0ff inset, 0 0 90px #ff0088;
      border: 18px solid #220033;
      border-image: linear-gradient(#00f0ff, #ff0088) 1;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .neon-cyan { color: #00f0ff; text-shadow: 0 0 12px #00f0ff, 0 0 24px #00f0ff; }
    .neon-pink { color: #ff0088; text-shadow: 0 0 12px #ff0088, 0 0 24px #ff0088; }
    .neon-orange { color: #ff6600; text-shadow: 0 0 10px #ff6600; }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,240,255,0.20) 50%);
      background-size: 100% 3px;
      pointer-events: none;
      animation: scan 1.6s linear infinite;
      z-index: 30;
      opacity: 0.88;
    }
    
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    .glitch {
      position: relative;
      animation: glitch 1.8s infinite;
    }
    
    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-3px, 2px); }
      40% { transform: translate(3px, -2px); }
      60% { transform: translate(-2px, 3px); }
      80% { transform: translate(2px, -3px); }
    }
    
    .card { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 4px solid #220033; 
      background: #1a1a2e;
    }
    .card:hover { 
      transform: translateY(-6px) scale(1.02); 
      box-shadow: 0 0 30px #00f0ff; 
      border-color: #ff0088;
    }
  </style>
</head>
<body class="scanline relative overflow-x-hidden">

  <nav class="bg-black border-b-4 border-[#00f0ff] p-4 flex items-center justify-between sticky top-0 z-50 replaced-terminal">

        </button>

  </div>
