<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbc8f">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; background: linear-gradient(180deg, #0a120a 0%, #1a2a1a 100%); }
    .pip-boy { background: #0f1a0f; box-shadow: 0 0 30px #8fbc8f inset, 0 0 60px #8fbc8f; border: 12px solid #8fbc8f; border-radius: 12px; position: relative; }
    .tactical-green { color: #8fbc8f; text-shadow: 0 0 10px #8fbc8f; }
    .alert-red { color: #c94f4f; }
    .scanline::after { content: ''; position: absolute; inset: 0; background: linear-gradient(transparent 50%, rgba(143,188,143,0.18) 50%); background-size: 100% 4px; pointer-events: none; animation: scan 3.5s linear infinite; z-index: 10; opacity: 0.7; }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    .card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(143,188,143,0.4); }
  </style>
</head>
<body class="bg-[#0a120a] text-[#8fbc8f] scanline relative overflow-x-hidden">

  <nav class="bg-black/95 border-b-4 border-[#8fbc8f] p-4 flex items-center justify-between sticky top-0 z-50 pip-boy">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl alert-red"></i>
      <h1 class="text-3xl font-bold tracking-widest tactical-green">DIGITAL FOB</h1>
      <span class="text-xs bg-[#c94f4f] text-white px-3 py-1 rounded">OPS TERMINAL</span>
    </div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1">X POSTS</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-link"></i> SOURCES</a>
      <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
    </div>
  </nav>

  <!-- HOME - Centered buttons -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto pip-boy p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 alert-red"></i>
      <h2 class="text-6xl mb-6 tactical-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#d1d5db]">Military • Simulation • RPG • Sports Sim Hangout<br>Real-time ops intel for the squad.</p>
      
      <div class="flex flex-wrap justify-center gap-8 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-lg">NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <span class="text-lg">X POSTS</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-link text-5xl"></i>
          <span class="text-lg">SOURCES</span>
        </button>
        <button onclick="showTab(4)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-lg">UPCOMING</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS -->
  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <div class="flex items-center gap-3">
        <input id="news-search" type="text" placeholder="Search news..." class="bg-[#1f2a1f] border border-[#8fbc8f] text-[#8fbc8f] px-4 py-2 rounded-2xl text-sm focus:outline-none">
        <button onclick="refreshNews()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
      </div>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    <div id="last-refreshed" class="text-xs text-center mt-6 text-[#8fbc8f]/70"></div>
  </div>

  <!-- X POSTS - Live-style with Refresh + Timestamp -->
  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> X / RUMORS &amp; DEV POSTS</h2>
      <button onclick="refreshXPosts()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="x-last-refreshed" class="text-xs text-center mt-8 text-[#8fbc8f]/70"></div>
  </div>

  <!-- SOURCES - Revised clean card layout -->
  <div id="tab-3" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-link"></i> ALL SOURCES</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <!-- X Accounts, Developers, News Sites, YouTube – now in clean cards -->
    </div>
  </div>

  <!-- UPCOMING GAMES - Live Steam API data -->
  <div id="tab-4" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-calendar"></i> UPCOMING GAMES</h2>
    <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // === LIVE STEAM API (with CORS proxy) ===
    const CORS_PROXY = 'https://corsproxy.io/?';
    const games = [
      {id: 1059220, name: '83'},
      {id: 1297900, name: 'Gothic Remake'},
      {id: 2483190, name: 'Forza Horizon 6'},
      {id: 2288340, name: 'Ace Combat 8'},
      {id: 2179480, name: 'Ardem'},
      {id: 2141130, name: 'Road Kings'}
    ];

    async function loadUpcoming() {
      const container = document.getElementById('upcoming-grid');
      container.innerHTML = '<div class="col-span-full text-center py-12 tactical-green">Loading live Steam data...</div>';

      const promises = games.map(async g => {
        try {
          const res = await fetch(CORS_PROXY + encodeURIComponent(`https://store.steampowered.com/api/appdetails?appids=${g.id}`));
          const data = await res.json();
          const app = data[g.id].data;
          return `
            <a href="${app.store_url || `https://store.steampowered.com/app/${g.id}`}" target="_blank" class="card block bg-[#1f2a1f] p-8 rounded-3xl border border-[#8fbc8f]">
              <img src="${app.header_image || `https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/${g.id}/capsule_616x353.jpg`}" class="w-full rounded-2xl mb-4">
              <h3 class="text-2xl font-bold mb-2">${app.name || g.name}</h3>
              <p class="text-sm text-[#d1d5db]">${app.release_date?.date || 'TBA 2026'}</p>
              <p class="text-sm mt-2">${app.price_overview ? '$' + (app.price_overview.final / 100).toFixed(2) : 'Price TBA'}</p>
            </a>
          `;
        } catch(e) { return `<div class="card bg-[#1f2a1f] p-8 rounded-3xl border border-[#8fbc8f]"><h3 class="text-2xl font-bold">${g.name}</h3><p class="text-sm text-[#d1d5db]">Data unavailable</p></div>`; }
      });

      const html = await Promise.all(promises);
      container.innerHTML = html.join('');
    }

    // === X Posts (static expanded + refresh) ===
    let xPosts = [ /* 20 recent-style posts from approved accounts */ ];

    function renderXPosts() {
      const container = document.getElementById('x-grid');
      container.innerHTML = xPosts.map(p => `
        <a href="${p.url}" target="_blank" class="card block bg-[#1f2a1f] p-6 rounded-3xl border border-[#8fbc8f] hover:border-[#c94f4f]">
          <div class="flex items-center gap-3 mb-3"><span class="font-bold">@${p.user}</span></div>
          <p class="text-sm">${p.text}</p>
        </a>
      `).join('');
    }

    function refreshXPosts() {
      renderXPosts();
      document.getElementById('x-last-refreshed').textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    }

    // Initialize
    loadUpcoming();
    renderXPosts();
    document.getElementById('x-last-refreshed').textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    showTab(0);
  </script>
</body>
</html>
