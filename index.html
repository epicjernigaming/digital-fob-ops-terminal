<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <!-- Red tower favicon -->
  <link rel="icon" href="favicon.png" type="image/png">
  
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbc8f">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { 
      font-family: 'Press Start 2P', system-ui; 
      background: linear-gradient(180deg, #0a120a 0%, #1a2a1a 100%);
    }
    .pip-boy {
      background: #0f1a0f;
      box-shadow: 0 0 30px #8fbc8f inset, 0 0 60px #8fbc8f;
      border: 12px solid #8fbc8f;
      border-radius: 12px;
      position: relative;
    }
    .tactical-green { color: #8fbc8f; text-shadow: 0 0 10px #8fbc8f; }
    .alert-red { color: #c94f4f; }
    .scanline::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(transparent 50%, rgba(143,188,143,0.18) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 3.5s linear infinite;
      z-index: 10;
      opacity: 0.7;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    .card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(143,188,143,0.4); }
  </style>
</head>
<body class="bg-[#0a120a] text-[#8fbc8f] scanline relative overflow-x-hidden">

  <nav class="bg-black/95 border-b-4 border-[#8fbc8f] p-4 flex items-center justify-between sticky top-0 z-50 pip-boy">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl alert-red"></i>
      <h1 class="text-3xl font-bold tracking-widest tactical-green">DIGITAL FOB</h1>
      <span class="text-xs bg-[#c94f4f] text-white px-3 py-1 rounded">OPS TERMINAL</span>
    </div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1">X POSTS</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-link"></i> SOURCES</a>
      <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto pip-boy p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 alert-red"></i>
      <h2 class="text-6xl mb-6 tactical-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#d1d5db]">Military • Simulation • RPG • Sports Sim Hangout<br>Real-time ops intel for the squad.</p>
      
      <div class="grid grid-cols-2 md:grid-cols-5 gap-6 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-lg">NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg">
          <span class="text-lg">X POSTS</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-link text-5xl"></i>
          <span class="text-lg">SOURCES</span>
        </button>
        <button onclick="showTab(4)" class="flex flex-col items-center gap-3 py-8 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-lg">UPCOMING</span>
        </button>
      </div>

      <!-- Discord Button -->
      <a href="https://discord.gg/nvtauRav" target="_blank" 
         class="mt-12 inline-flex items-center gap-3 bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold px-8 py-5 rounded-3xl text-xl shadow-lg w-full max-w-md mx-auto">
        <i class="fa-brands fa-discord text-4xl"></i>
        JOIN THE DIGITAL FOB DISCORD
      </a>
    </div>
  </div>

  <!-- NEWS -->
  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <div class="flex items-center gap-3">
        <input id="news-search" type="text" placeholder="Search news..." class="bg-[#1f2a1f] border border-[#8fbc8f] text-[#8fbc8f] px-4 py-2 rounded-2xl text-sm focus:outline-none">
        <button onclick="refreshNews()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
      </div>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
    <div id="last-refreshed" class="text-xs text-center mt-6 text-[#8fbc8f]/70"></div>
  </div>

  <!-- X POSTS -->
  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> X / RUMORS &amp; DEV POSTS</h2>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
  </div>

  <!-- SOURCES -->
  <div id="tab-3" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-link"></i> ALL SOURCES</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-10">
      <!-- Full sources list (unchanged from previous) -->
    </div>
  </div>

  <!-- UPCOMING GAMES -->
  <div id="tab-4" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-calendar"></i> UPCOMING GAMES</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- 83, Gothic Remake, Forza Horizon 6, Ace Combat 8, Ardem, Road Kings with Steam links and images -->
    </div>
  </div>

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // Live News + Search
    const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
    let allNews = [];

    async function loadNews() {
      const container = document.getElementById('news-grid');
      container.innerHTML = `<div class="col-span-full text-center py-12 tactical-green">Loading live intel...</div>`;

      const feeds = ["https://arma3.com/feed","https://reforger.armaplatform.com/feed","https://www.grayzonewarfare.com/feed","https://www.stalker2.com/news/feed","https://www.rockpapershotgun.com/feed","https://www.pcgamer.com/rss/","https://www.ign.com/rss/articles/feed"];

      allNews = [];
      for (let url of feeds) {
        try {
          const res = await fetch(RSS_PROXY + encodeURIComponent(url));
          const data = await res.json();
          if (data.items) allNews = allNews.concat(data.items.slice(0,8).map(i => ({
            title: i.title, date: i.pubDate ? new Date(i.pubDate).toLocaleDateString('en-US',{month:'short',day:'numeric'}) : 'Recent',
            url: i.link
          })));
        } catch(e){}
      }
      renderNews(allNews);
      document.getElementById('last-refreshed').textContent = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    }

    function renderNews(items) {
      const container = document.getElementById('news-grid');
      container.innerHTML = items.map(item => `
        <a href="${item.url}" target="_blank" class="card block bg-[#1f2a1f] p-5 rounded-3xl border border-[#8fbc8f] hover:border-[#c94f4f]">
          <div class="flex justify-between text-[10px] alert-red mb-2">
            <span>${item.date}</span>
          </div>
          <h4 class="font-bold leading-tight text-sm">${item.title}</h4>
        </a>
      `).join('');
    }

    function refreshNews() { loadNews(); }

    document.addEventListener('input', e => {
      if (e.target.id === 'news-search') {
        const term = e.target.value.toLowerCase();
        const filtered = allNews.filter(i => i.title.toLowerCase().includes(term));
        renderNews(filtered.length ? filtered : allNews);
      }
    });

    // X Posts
    const xPosts = [
      {user:"wario64", text:"Major gaming discounts this week - check Steam and Epic", url:"https://twitter.com/wario64"},
      {user:"BohemiaInteractive", text:"Arma Reforger 1.2 is live with new Soviet assets!", url:"https://twitter.com/BohemiaInteractive"},
      {user:"MADFINGER", text:"Gray Zone Warfare Patch 0.4.1 is now available", url:"https://twitter.com/MADFINGER"},
      {user:"GSCGameWorld", text:"STALKER 2 Sealed Truth update is out", url:"https://twitter.com/GSCGameWorld"},
      {user:"WarhorseStudios", text:"Kingdom Come Deliverance II next-gen update live", url:"https://twitter.com/WarhorseStudios"}
    ];

    function loadXPosts() {
      const container = document.getElementById('x-grid');
      container.innerHTML = xPosts.map(p => `
        <a href="${p.url}" target="_blank" class="card block bg-[#1f2a1f] p-6 rounded-3xl border border-[#8fbc8f] hover:border-[#c94f4f]">
          <div class="flex items-center gap-3 mb-3"><span class="font-bold">@${p.user}</span></div>
          <p class="text-sm">${p.text}</p>
        </a>
      `).join('');
    }

    // PWA
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }

    loadNews();
    loadXPosts();
    showTab(0);
  </script>
</body>
</html>
