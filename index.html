<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00ff88">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: linear-gradient(rgba(5,5,10,0.85), rgba(5,5,10,0.9)), url('background.jpg') center/cover no-repeat fixed;
      color: #00ff88;
      font-size: 1.45rem;
      position: relative;
      overflow-x: hidden;
    }
    
    .neon-red { color: #ff2222; text-shadow: 0 0 10px #ff2222; }
    .neon-green { color: #00ff88; text-shadow: 0 0 10px #00ff88; }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,255,136,0.12) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.5s linear infinite;
      z-index: 5;
      opacity: 0.7;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    .big-button {
      transition: all 0.4s ease;
      border: 4px solid #00ff88;
      background: rgba(26, 26, 26, 0.95);
    }
    .big-button:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 40px #00ff88;
      border-color: #ff2222;
    }

    .hot-now-card {
      transition: all 0.3s ease;
      border: 2px solid #333;
    }
    .hot-now-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 0 25px #00ff88;
      border-color: #ff00aa;
    }
    
    #digital-rain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;           /* Fixed - behind everything */
      opacity: 0.18;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body class="scanline relative overflow-x-hidden">

  <!-- Digital Rain - Fixed z-index -->
  <canvas id="digital-rain"></canvas>

  <!-- Top Nav -->
  <nav class="terminal-nav p-4 sticky top-0 z-50 bg-black/90 border-b border-[#333]">
    <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between gap-4">
      <div class="flex items-center gap-4 flex-shrink-0">
        <i class="fa-solid fa-tower-observation text-4xl neon-red"></i>
        <div>
          <h1 class="text-3xl font-bold tracking-widest neon-green">THE DIGITAL FOB</h1>
          <p class="text-sm neon-red tracking-widest">OPERATIONS TERMINAL</p>
        </div>
      </div>

      <div class="flex items-center gap-3 text-lg flex-shrink-0">
        <span class="neon-red blink-live">●</span>
        <span class="neon-red font-bold">LIVE</span>
        <span class="text-white">SYSTEM ACTIVE</span>
      </div>

      <div class="flex gap-5 text-sm uppercase tracking-widest overflow-x-auto nav-tabs pb-1 lg:pb-0 flex-shrink-0">
        <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-house"></i> HOME</a>
        <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-newspaper"></i> NEWS</a>
        <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-x-twitter"></i> X FEED</a>
        <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
        <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-tags"></i> DEALS</a>
        <a onclick="showTab(5)" class="cursor-pointer hover:text-white flex items-center gap-1.5 whitespace-nowrap"><i class="fa-solid fa-images"></i> GALLERY</a>
      </div>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-8">
    <!-- HOT RIGHT NOW -->
    <div class="terminal-panel mb-12">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-4xl neon-green flex items-center gap-4">
          <span class="pulse-dot inline-block w-4 h-4 bg-emerald-400 rounded-full"></span>
          HOT RIGHT NOW / ACTIVE OPS
        </h2>
        <button onclick="loadHotNow()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#00ff88] text-black rounded-2xl text-sm font-bold">REFRESH</button>
      </div>
      <div id="hot-now-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <!-- Big Navigation Buttons -->
    <div class="max-w-2xl mx-auto p-8 rounded-3xl" style="background: transparent; border: none; box-shadow: none;">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 neon-red"></i>
      <h2 class="text-6xl mb-4 neon-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-white">Operations Terminal<br>Real-time squad intel.</p>
      
      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="big-button flex flex-col items-center gap-4 py-10 px-8 text-white font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-xl">NEWS</span>
        </button>
        <button onclick="showTab(6)" class="big-button flex flex-col items-center gap-4 py-10 px-8 text-white font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-fire text-5xl"></i>
          <span class="text-xl">ACTIVE OPS</span>
        </button>
        <button onclick="showTab(3)" class="big-button flex flex-col items-center gap-4 py-10 px-8 text-white font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-xl">UPCOMING</span>
        </button>
        <button onclick="showTab(4)" class="big-button flex flex-col items-center gap-4 py-10 px-8 text-white font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-tags text-5xl"></i>
          <span class="text-xl">DEALS</span>
        </button>
        <button onclick="showTab(5)" class="big-button flex flex-col items-center gap-4 py-10 px-8 text-white font-bold rounded-3xl shadow-lg">
          <i class="fa-solid fa-images text-5xl"></i>
          <span class="text-xl">GALLERY</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ACTIVE OPS Tab (for when you want it separate) -->
  <div id="tab-6" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-4xl neon-green flex items-center gap-4">
        <span class="pulse-dot inline-block w-4 h-4 bg-emerald-400 rounded-full"></span>
        HOT RIGHT NOW / ACTIVE OPS
      </h2>
      <button onclick="loadHotNow()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#00ff88] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="hot-now-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
  </div>

  <!-- Bottom Discord Banner -->
  <div id="discord-bottom-banner">
    <div class="max-w-6xl mx-auto w-full flex items-center justify-between gap-8 px-4">
      <div class="flex items-center gap-6">
        <span class="text-2xl neon-green">SQUAD COMM ACTIVE</span>
        <div class="flex items-center gap-3 text-lg">
          <span id="online-count" class="font-bold text-emerald-400">12</span>
          <span class="text-white">Operators Online</span>
          <span class="pulse-dot inline-block w-3 h-3 bg-emerald-400 rounded-full"></span>
        </div>
      </div>
      <a href="https://discord.gg/nvtauRav" target="_blank" class="px-8 py-3 text-lg bg-[#5865F2] hover:bg-[#4752C4] text-white font-bold tracking-widest flex items-center gap-3 transition-all">
        <i class="fa-brands fa-discord text-2xl"></i>
        JOIN THE DIGITAL FOB
      </a>
    </div>
  </div>

  <script>
    function initDigitalRain() {
      const canvas = document.getElementById('digital-rain');
      const ctx = canvas.getContext('2d');
      function resize() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
      }
      resize();
      window.addEventListener('resize', resize);

      const chars = '01アイウエオカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const fontSize = 14;
      const columns = canvas.width / fontSize;
      const drops = Array(Math.floor(columns)).fill(1);

      function draw() {
        ctx.fillStyle = 'rgba(5,5,10,0.05)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = `${fontSize}px VT323`;
        for (let i = 0; i < drops.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
          drops[i]++;
        }
      }
      setInterval(draw, 45);
    }

    // Load Hot Right Now
    async function loadHotNow() {
      const container = document.getElementById('hot-now-grid');
      container.innerHTML = `<div class="col-span-full text-center py-12 neon-green">SCANNING ACTIVE OPS...</div>`;

      try {
        const res = await fetch('https://epicjernigaming.github.io/digital-fob-ops-terminal/hot-right-now.json', { cache: 'no-store' });
        const data = await res.json();

        if (!data.games || data.games.length === 0) throw new Error("No data");

        container.innerHTML = data.games.map(game => `
          <div class="hot-now-card border border-[#333] hover:border-[#00ff88] p-6 rounded-3xl bg-black/70">
            <div class="flex justify-between items-start">
              <h4 class="font-bold text-2xl neon-green">${game.name}</h4>
              <span class="neon-red text-sm">${game.count} operators</span>
            </div>
            <p class="text-xs text-gray-400 mt-3">Active in squad comms</p>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = `
          <div class="col-span-full text-center py-12 text-red-400">
            No active ops logged yet.<br>
            <span class="text-sm text-gray-400">Type "Playing: Game Name" in the Discord channel to appear here.</span>
          </div>`;
      }
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');

      const banner = document.getElementById('discord-bottom-banner');
      if (n === 0) banner.classList.add('show');
      else banner.classList.remove('show');

      if (n === 0) loadHotNow();
    }

    window.addEventListener('load', () => {
      initDigitalRain();
      showTab(0);
    });
  </script>
</body>
</html>
