<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbc8f">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    body { font-family: 'Press Start 2P', system-ui; background: #0a120a; }
    .pip-boy {
      background: #0f1a0f;
      box-shadow: 0 0 40px #8fbc8f inset, 0 0 80px #8fbc8f, 0 0 20px rgba(0,0,0,0.9) inset;
      border: 18px solid #4a5f4a;
      border-image: linear-gradient(#8fbc8f, #4a5f4a) 1;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    .crt::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 70%, rgba(10,18,10,0.7) 100%);
      z-index: 20;
      border-radius: 8px;
    }
    .tactical-green { color: #9fff9f; text-shadow: 0 0 8px #8fbc8f, 0 0 16px #8fbc8f; }
    .alert-red { color: #ff6666; text-shadow: 0 0 8px #c94f4f; }
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(143,188,143,0.25) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.8s linear infinite;
      z-index: 30;
      opacity: 0.85;
    }
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    .card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); border: 3px solid #4a5f4a; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 12px 25px rgba(143,188,143,0.5); }
  </style>
</head>
<body class="bg-[#0a120a] text-[#8fbc8f] scanline relative overflow-x-hidden crt">

  <nav class="bg-black/95 border-b-4 border-[#8fbc8f] p-4 flex items-center justify-between sticky top-0 z-50 pip-boy">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl alert-red"></i>
      <h1 class="text-3xl font-bold tracking-widest tactical-green">DIGITAL FOB</h1>
      <span class="text-xs bg-[#c94f4f] text-white px-3 py-1 rounded">OPS TERMINAL v1.0</span>
    </div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1">X POSTS</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
      <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-suitcase"></i> INVENTORY</a>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto pip-boy p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 alert-red"></i>
      <h2 class="text-6xl mb-6 tactical-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#d1d5db]">Military • Simulation • RPG • Sports Sim Hangout<br>Real-time ops intel for the squad.</p>
      
      <div class="flex flex-wrap justify-center gap-8 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-lg">NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <span class="text-lg">X POSTS</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-lg">UPCOMING</span>
        </button>
        <button onclick="showTab(4)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-suitcase text-5xl"></i>
          <span class="text-lg">INVENTORY</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS -->
  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <button onclick="refreshNews()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </div>

  <!-- X POSTS -->
  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl tactical-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> X / RUMORS &amp; DEV POSTS</h2>
      <button onclick="refreshXPosts()" class="px-4 py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="x-last-refreshed" class="text-xs text-center mt-6 text-[#8fbc8f]/70"></div>
  </div>

  <!-- UPCOMING GAMES -->
  <div id="tab-3" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-calendar"></i> UPCOMING GAMES</h2>
    <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
  </div>

  <!-- INVENTORY - Fallout Style -->
  <div id="tab-4" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <h2 class="text-4xl mb-10 tactical-green flex items-center gap-4"><i class="fa-solid fa-suitcase"></i> SQUAD INVENTORY</h2>
    <div id="inventory-grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
    <div class="mt-8 pip-boy p-6 rounded-3xl text-center">
      <p class="text-sm">Total Weight: <span id="total-weight" class="tactical-green">14.2 / 50</span></p>
    </div>
  </div>

  <!-- Pip-Boy Sound Effects -->
  <audio id="beep" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="click" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>
  <audio id="equip" src="https://freesound.org/data/previews/276/276951_5121236-lq.mp3"></audio>

  <script>
    function playSound(id) {
      const audio = document.getElementById(id);
      audio.currentTime = 0;
      audio.play().catch(() => {});
    }

    function showTab(n) {
      playSound('beep');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // X Posts from top 20 accounts (example recent posts)
    const xPosts = [
      {user:"wario64", text:"Major gaming discounts this week - check Steam and Epic", url:"https://twitter.com/wario64"},
      {user:"BohemiaInteractive", text:"Arma Reforger 1.2 is live with new Soviet assets!", url:"https://twitter.com/BohemiaInteractive"},
      {user:"MADFINGER", text:"Gray Zone Warfare Patch 0.4.1 is now available", url:"https://twitter.com/MADFINGER"},
      {user:"GSCGameWorld", text:"STALKER 2 Sealed Truth update is out", url:"https://twitter.com/GSCGameWorld"},
      {user:"WarhorseStudios", text:"Kingdom Come Deliverance II next-gen update live", url:"https://twitter.com/WarhorseStudios"},
      {user:"TaleWorlds", text:"Bannerlord 1.3.0 is now available", url:"https://twitter.com/TaleWorlds"},
      // ... 14 more posts from the top 20 accounts ...
    ];

    function loadXPosts() {
      const container = document.getElementById('x-grid');
      container.innerHTML = xPosts.map(p => `
        <a href="${p.url}" target="_blank" class="card block bg-[#1f2a1f] p-6 rounded-3xl border border-[#8fbc8f] hover:border-[#c94f4f]">
          <div class="flex items-center gap-3 mb-3"><span class="font-bold">@${p.user}</span></div>
          <p class="text-sm">${p.text}</p>
        </a>
      `).join('');
      document.getElementById('x-last-refreshed').innerHTML = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    }

    function refreshXPosts() {
      playSound('click');
      loadXPosts();
    }

    // Fallout Inventory System
    let inventory = JSON.parse(localStorage.getItem('fobInventory')) || [
      {id:1, name:"AK-74N", type:"Weapon", condition:85, weight:4.2},
      {id:2, name:"STALKER Artifact", type:"Tool", condition:100, weight:0.8},
      {id:3, name:"M4A1", type:"Weapon", condition:65, weight:3.1},
      // more items...
    ];

    function renderInventory() {
      const container = document.getElementById('inventory-grid');
      container.innerHTML = inventory.map(item => `
        <div class="card bg-[#1f2a1f] p-6 rounded-3xl border border-[#8fbc8f]">
          <div class="text-4xl mb-4">🔫</div>
          <h4 class="text-lg font-bold">${item.name}</h4>
          <p class="text-xs text-[#d1d5db]">${item.type}</p>
          <div class="mt-4 h-2 bg-[#4a5f4a] rounded"><div class="h-2 bg-[#8fbc8f]" style="width:${item.condition}%"></div></div>
          <p class="text-xs mt-2">Condition: ${item.condition}% | Weight: ${item.weight}kg</p>
          <button onclick="equipItem(${item.id}); playSound('equip')" class="mt-4 w-full py-2 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black text-xs font-bold rounded-2xl">EQUIP</button>
        </div>
      `).join('');
      document.getElementById('total-weight').textContent = `${inventory.reduce((sum,i)=>sum+i.weight,0).toFixed(1)} / 50`;
    }

    function equipItem(id) {
      alert("✅ Equipped item! (Fallout-style sound played)");
      // In a real system this would update equipped status
    }

    // Initialize everything
    loadXPosts();
    renderInventory();
    showTab(0);
  </script>
</body>
</html>
