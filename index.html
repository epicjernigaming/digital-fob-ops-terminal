<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff2222">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: 
        linear-gradient(rgba(5,5,10,0.78), rgba(5,5,10,0.85)),
        url('background.jpg') center/cover no-repeat fixed;
      color: #00ff88;
      font-size: 1.45rem;
      position: relative;
      overflow-x: hidden;
    }
    
    .terminal {
      background: rgba(15,15,20,0.92);
      box-shadow: 0 0 35px #ff2222 inset;
      border: 18px solid #1a1a1a;
      border-image: linear-gradient(#ff2222, #00ff88) 1;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      z-index: 10;
    }
    
    .neon-red { color: #ff2222; text-shadow: none; }
    .neon-green { color: #00ff88; text-shadow: none; }
    
    /* Enhanced Scanlines */
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,255,136,0.12) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.5s linear infinite;
      z-index: 5;
      opacity: 0.7;
    }
    
    @keyframes scan { 
      0% { background-position: 0 0; } 
      100% { background-position: 0 100%; } 
    }
    
    /* Occasional Glitch Effect */
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }
    
    .glitch-active {
      animation: glitch 0.3s linear;
      filter: hue-rotate(10deg) saturate(1.2);
    }
    
    .card { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 4px solid #222222; 
      background: rgba(20,20,25,0.95);
    }
    .card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 0 20px #ff2222; 
      border-color: #00ff88;
    }

    /* Digital Rain Canvas */
    #digital-rain {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      opacity: 0.18; /* Very subtle */
      mix-blend-mode: screen;
    }
  </style>
</head>
<body class="scanline relative overflow-x-hidden">

  <!-- Digital Rain Canvas (Background Layer) -->
  <canvas id="digital-rain"></canvas>

  <nav class="bg-black/90 border-b-4 border-[#ff2222] p-4 flex items-center justify-between sticky top-0 z-50 terminal">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl neon-red" style="filter: none;"></i>
      <h1 class="text-3xl font-bold tracking-widest neon-green">DIGITAL FOB</h1>
    </div>
    <div class="text-xl neon-red font-bold">DIGITAL FOB • OPS TERMINAL</div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-x-twitter"></i> X FEED</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
    </div>
  </nav>

  <!-- HOME (Transparent as before) -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto terminal p-8 rounded-3xl" style="background: transparent; border: none; box-shadow: none;">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 neon-red" style="filter: none;"></i>
      <h2 class="text-6xl mb-6 neon-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#bbbbbb]">Cyberpunk Military Ops Terminal<br>Real-time squad intel.</p>
      
      <div class="flex flex-wrap justify-center gap-8">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#00ff88] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span>NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#00ff88] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-x-twitter text-5xl"></i>
          <span>X FEED</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#00ff88] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span>UPCOMING</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS, X POSTS, UPCOMING tabs remain the same as your previous version -->

  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <button onclick="refreshNews()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#00ff88] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </div>

  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> LATEST TWEETS FROM SQUAD SOURCES</h2>
      <button onclick="refreshXPosts()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#00ff88] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="x-last-refreshed" class="text-xs text-center mt-8 text-[#00ff88]/70"></div>
  </div>

  <div id="tab-3" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-calendar"></i> UPCOMING OPS</h2>
      <button onclick="refreshUpcoming()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#00ff88] text-black rounded-2xl text-sm font-bold">REFRESH STEAM</button>
    </div>
    <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <script>
    // Sound Effects (kept from before)
    function playSound(id) {
      const audio = document.getElementById(id);
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
      }
    }

    // Digital Rain Canvas
    function initDigitalRain() {
      const canvas = document.getElementById('digital-rain');
      const ctx = canvas.getContext('2d');
      
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const chars = '01アイウエオカキクケコ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      const fontSize = 14;
      const columns = canvas.width / fontSize;
      const drops = Array(Math.floor(columns)).fill(1);

      function draw() {
        ctx.fillStyle = 'rgba(5,5,10,0.05)'; // Faint trail
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.fillStyle = '#00ff88';
        ctx.font = `${fontSize}px VT323`;
        
        for (let i = 0; i < drops.length; i++) {
          const text = chars[Math.floor(Math.random() * chars.length)];
          ctx.fillText(text, i * fontSize, drops[i] * fontSize);
          
          if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
          }
          drops[i]++;
        }
      }
      
      setInterval(draw, 45); // Slightly slower for subtlety
    }

    // Occasional Glitch Effect
    function triggerGlitch() {
      document.body.classList.add('glitch-active');
      setTimeout(() => {
        document.body.classList.remove('glitch-active');
      }, 400);
    }
    
    // Random glitch every 8-15 seconds
    setInterval(() => {
      if (Math.random() > 0.6) triggerGlitch();
    }, 10000);

    // Your existing RSS, X Posts, Upcoming functions (unchanged from your last version)
    const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";
    // ... (paste your loadNews, refreshNews, loadXPosts, etc. here - kept identical)

    function showTab(n) {
      playSound('click');
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // Initialize everything
    initDigitalRain();
    // loadNews(); loadXPosts(); loadUpcoming(); showTab(0);  ← add your existing init calls here
  </script>

  <!-- Sound Elements -->
  <audio id="click" src="https://assets.mixkit.co/sfx/preview/296/296.mp3" preload="auto"></audio>
  <audio id="refresh" src="https://assets.mixkit.co/sfx/preview/143/143.mp3" preload="auto"></audio>
</body>
</html>
