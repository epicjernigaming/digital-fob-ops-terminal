<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#8fbc8f">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    :root {
      --phosphor: #aaffaa;
    }
    
    body { 
      font-family: 'VT323', monospace; 
      background: #050a05;
      color: var(--phosphor);
    }
    
    .pip-boy {
      background: #0f1a0f;
      box-shadow: 
        0 0 50px var(--phosphor) inset,
        0 0 110px var(--phosphor),
        0 0 40px rgba(0,0,0,0.98) inset;
      border: 24px solid #3a4a3a;
      border-image: linear-gradient(#8fbc8f, #3a4a3a) 1;
      border-radius: 14px;
      position: relative;
      overflow: hidden;
    }
    
    .crt::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 62%, rgba(5,10,5,0.88) 100%);
      z-index: 20;
      border-radius: 14px;
    }
    
    .tactical-green { 
      color: var(--phosphor); 
      text-shadow: 
        0 0 8px var(--phosphor),
        0 0 16px var(--phosphor),
        0 0 28px #4a5f4a;
      animation: phosphor-breath 4s ease-in-out infinite;
    }
    
    .alert-red { 
      color: #ff7777; 
      text-shadow: 0 0 12px #c94f4f; 
    }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(143,188,143,0.38) 50%);
      background-size: 100% 3px;
      pointer-events: none;
      animation: scan 2.1s linear infinite;
      z-index: 30;
      opacity: 0.92;
    }
    
    @keyframes scan { 
      0% { background-position: 0 0; } 
      100% { background-position: 0 100%; } 
    }
    
    @keyframes phosphor-breath {
      0%, 100% { opacity: 1; text-shadow: 0 0 8px var(--phosphor), 0 0 16px var(--phosphor); }
      50% { opacity: 0.96; text-shadow: 0 0 12px var(--phosphor), 0 0 24px var(--phosphor); }
    }
    
    .card { 
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 6px solid #3a4a3a;
      background: #1a2a1a;
    }
    .card:hover { 
      transform: translateY(-6px); 
      box-shadow: 0 20px 40px rgba(143,188,143,0.7); 
    }
    
    button {
      transition: all 0.15s ease;
      box-shadow: 0 6px 0 #3a4a3a;
    }
    button:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #3a4a3a;
    }
  </style>
</head>
<body class="bg-[#0a120a] text-[#8fbc8f] scanline relative overflow-x-hidden crt">

  <nav class="bg-black/95 border-b-4 border-[#8fbc8f] p-4 flex items-center justify-between sticky top-0 z-50 pip-boy">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl alert-red"></i>
      <h1 class="text-3xl font-bold tracking-widest tactical-green">DIGITAL FOB</h1>
      <span class="text-xs bg-[#c94f4f] text-white px-3 py-1 rounded">OPS TERMINAL</span>
    </div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1">X POSTS</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
      <a onclick="showTab(4)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-suitcase"></i> INVENTORY</a>
      <a onclick="showTab(5)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-radio"></i> RADIO</a>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto pip-boy p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 alert-red"></i>
      <h2 class="text-6xl mb-6 tactical-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#d1d5db]">Military • Simulation • RPG <br>Real-time ops intel for the squad.</p>
      
      <div class="flex flex-wrap justify-center gap-8 max-w-4xl mx-auto">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span class="text-lg">NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <span class="text-lg">X POSTS</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span class="text-lg">UPCOMING</span>
        </button>
        <button onclick="showTab(4)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-suitcase text-5xl"></i>
          <span class="text-lg">INVENTORY</span>
        </button>
        <button onclick="showTab(5)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#8fbc8f] hover:bg-[#c94f4f] text-black font-bold rounded-3xl shadow-lg min-w-[180px]">
          <i class="fa-solid fa-radio text-5xl"></i>
          <span class="text-lg">RADIO</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS, X POSTS, UPCOMING, INVENTORY, RADIO tabs (your existing content) -->

  <script>
    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // Your existing load functions for News, X Posts, Upcoming, Inventory, Radio go here

    showTab(0);
  </script>
</body>
</html>
