<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff2222">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: 
        linear-gradient(rgba(10,10,15,0.88), rgba(10,10,15,0.95)),
        url('https://i.imgur.com/m3hwL.jpg') center/cover no-repeat fixed;
      color: #00ff88;
      font-size: 1.45rem;
      position: relative;
      overflow-x: hidden;
    }
    
    .terminal {
      background: rgba(17,17,17,0.96);
      box-shadow: 0 0 30px #ff2222 inset;
      border: 18px solid #222222;
      border-image: linear-gradient(#ff2222, #00ff88) 1;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .neon-red { color: #ff2222; text-shadow: none; }
    .neon-green { color: #00ff88; text-shadow: none; }
    .neon-yellow { color: #ffcc00; text-shadow: none; }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,255,136,0.12) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.8s linear infinite;
      z-index: 30;
      opacity: 0.7;
    }
    
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    .card { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 4px solid #333333; 
      background: rgba(26,26,26,0.95);
    }
    .card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 0 20px #ff2222; 
      border-color: #ffcc00;
    }
  </style>
</head>
<body class="scanline relative overflow-x-hidden">

  <nav class="bg-black/90 border-b-4 border-[#ff2222] p-4 flex items-center justify-between sticky top-0 z-50 terminal">
