<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIGITAL FOB • OPS TERMINAL</title>
  
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#ff2222">

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
    
    body { 
      font-family: 'VT323', monospace; 
      background: 
        linear-gradient(rgba(10,10,15,0.88), rgba(10,10,15,0.95)),
        url('https://i.imgur.com/m3hwL.jpg') center/cover no-repeat fixed;
      color: #00ff88;
      font-size: 1.45rem;
      position: relative;
      overflow-x: hidden;
    }
    
    .terminal {
      background: rgba(17,17,17,0.96);
      box-shadow: 0 0 30px #ff2222 inset;
      border: 18px solid #222222;
      border-image: linear-gradient(#ff2222, #00ff88) 1;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
    }
    
    .neon-red { color: #ff2222; text-shadow: none; }
    .neon-green { color: #00ff88; text-shadow: none; }
    .neon-yellow { color: #ffcc00; text-shadow: none; }
    
    .scanline::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(transparent 50%, rgba(0,255,136,0.12) 50%);
      background-size: 100% 4px;
      pointer-events: none;
      animation: scan 2.8s linear infinite;
      z-index: 30;
      opacity: 0.7;
    }
    
    @keyframes scan { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
    
    .card { 
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
      border: 4px solid #333333; 
      background: rgba(26,26,26,0.95);
    }
    .card:hover { 
      transform: translateY(-4px); 
      box-shadow: 0 0 20px #ff2222; 
      border-color: #ffcc00;
    }
  </style>
</head>
<body class="scanline relative overflow-x-hidden">

  <nav class="bg-black/90 border-b-4 border-[#ff2222] p-4 flex items-center justify-between sticky top-0 z-50 terminal">
    <div class="flex items-center gap-3">
      <i class="fa-solid fa-tower-observation text-4xl neon-red" style="filter: none;"></i>
      <h1 class="text-3xl font-bold tracking-widest neon-green">DIGITAL FOB</h1>
    </div>
    <div class="text-xl neon-red font-bold">DIGITAL FOB • OPS TERMINAL</div>
    <div class="flex gap-6 text-sm uppercase">
      <a onclick="showTab(0)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-home"></i> HOME</a>
      <a onclick="showTab(1)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-newspaper"></i> NEWS</a>
      <a onclick="showTab(2)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-x-twitter"></i> X FEED</a>
      <a onclick="showTab(3)" class="cursor-pointer hover:text-white flex items-center gap-1"><i class="fa-solid fa-calendar"></i> UPCOMING</a>
    </div>
  </nav>

  <!-- HOME -->
  <div id="tab-0" class="tab-content max-w-6xl mx-auto p-12 text-center">
    <div class="max-w-2xl mx-auto terminal p-8 rounded-3xl">
      <i class="fa-solid fa-tower-observation text-9xl mb-8 neon-red" style="filter: none;"></i>
      <h2 class="text-6xl mb-6 neon-green">THE DIGITAL FOB</h2>
      <p class="text-2xl mb-12 text-[#cccccc]">Cyberpunk Military Ops Terminal<br>Real-time squad intel.</p>
      
      <div class="flex flex-wrap justify-center gap-8">
        <button onclick="showTab(1)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#ffcc00] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-newspaper text-5xl"></i>
          <span>NEWS</span>
        </button>
        <button onclick="showTab(2)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#ffcc00] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-x-twitter text-5xl"></i>
          <span>X FEED</span>
        </button>
        <button onclick="showTab(3)" class="flex flex-col items-center gap-3 py-8 px-12 bg-[#ff2222] hover:bg-[#ffcc00] text-black font-bold rounded-3xl shadow-lg min-w-[200px] text-2xl">
          <i class="fa-solid fa-calendar text-5xl"></i>
          <span>UPCOMING</span>
        </button>
      </div>
    </div>
  </div>

  <!-- NEWS -->
  <div id="tab-1" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-newspaper"></i> LATEST OPS INTEL</h2>
      <button onclick="refreshNews()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#ffcc00] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
  </div>

  <!-- X POSTS -->
  <div id="tab-2" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-x-twitter"></i> LATEST TWEETS FROM SQUAD SOURCES</h2>
      <button onclick="refreshXPosts()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#ffcc00] text-black rounded-2xl text-sm font-bold">REFRESH</button>
    </div>
    <div id="x-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    <div id="x-last-refreshed" class="text-xs text-center mt-8 text-[#00ff88]/70"></div>
  </div>

  <!-- UPCOMING GAMES -->
  <div id="tab-3" class="tab-content max-w-6xl mx-auto p-8 hidden">
    <div class="flex justify-between items-center mb-8">
      <h2 class="text-4xl neon-green flex items-center gap-4"><i class="fa-solid fa-calendar"></i> UPCOMING OPS</h2>
      <button onclick="refreshUpcoming()" class="px-6 py-3 bg-[#ff2222] hover:bg-[#ffcc00] text-black rounded-2xl text-sm font-bold">REFRESH STEAM</button>
    </div>
    <div id="upcoming-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
  </div>

  <script>
    const RSS_PROXY = "https://api.rss2json.com/v1/api.json?rss_url=";

    const newsFeeds = [
      "https://www.pcgamer.com/rss/",
      "https://www.rockpapershotgun.com/feed",
      "https://www.ign.com/rss/articles/feed",
      "https://www.gamespot.com/feeds/news/",
      "https://www.eurogamer.net/feed",
      "https://www.polygon.com/rss/index.xml",
      "https://kotaku.com/rss",
      "https://www.gamesradar.com/feed",
      "https://www.thegamer.com/feed",
      "https://www.dualshockers.com/feed",
      "https://wccftech.com/feed/",
      "https://www.dsogaming.com/feed",
      "https://steamcommunity.com/games/steam/news/rss"
    ];

    async function loadNews() {
      const container = document.getElementById('news-grid');
      container.innerHTML = `<div class="col-span-full text-center py-12 neon-green">Loading live intel...</div>`;

      let allItems = [];
      for (let url of newsFeeds) {
        try {
          const res = await fetch(RSS_PROXY + encodeURIComponent(url));
          const data = await res.json();
          if (data.items) {
            allItems = allItems.concat(data.items.slice(0, 5).map(item => ({
              title: item.title,
              date: item.pubDate ? new Date(item.pubDate).toLocaleDateString('en-US', {month:'short', day:'numeric'}) : 'Recent',
              url: item.link,
              source: new URL(item.link).hostname.replace('www.', '')
            })));
          }
        } catch(e) {}
      }

      container.innerHTML = allItems.map(item => `
        <a href="${item.url}" target="_blank" class="card block p-6 rounded-3xl border border-[#333333] hover:border-[#ffcc00]">
          <div class="flex justify-between items-center text-base mb-3">
            <span class="neon-red">${item.date}</span>
            <span class="neon-yellow">${item.source}</span>
          </div>
          <h4 class="font-bold leading-tight neon-green">${item.title}</h4>
        </a>
      `).join('');
    }

    function refreshNews() { loadNews(); }

    function loadXPosts() {
      const container = document.getElementById('x-grid');
      const recentTweets = [
        { user: "@Wario64", text: "Pragmata (Steam) is $49.99 on Newegg w/ code EPF4425 #ad", time: "Just now", url: "https://twitter.com/Wario64/status/2045655213005308089" },
        { user: "@pcgamer", text: "Owlcat reveals two new 40K companions...", time: "2h ago", url: "https://twitter.com/pcgamer/status/2045699876701585483" },
        { user: "@BohemiaInteractive", text: "Arma Reforger update rolling out soon...", time: "5h ago", url: "#" },
        { user: "@OperatorDrewski", text: "New milsim session tonight - join the server!", time: "Yesterday", url: "#" },
        { user: "@GSCGameWorld", text: "STALKER 2 community update incoming...", time: "Yesterday", url: "#" }
      ];

      container.innerHTML = recentTweets.map(tweet => `
        <a href="${tweet.url}" target="_blank" class="card block p-6 rounded-3xl border border-[#333333] hover:border-[#ffcc00]">
          <div class="flex justify-between text-base mb-3">
            <span class="neon-yellow font-bold">${tweet.user}</span>
            <span class="neon-red">${tweet.time}</span>
          </div>
          <p class="neon-green leading-tight">${tweet.text}</p>
        </a>
      `).join('');
      
      document.getElementById('x-last-refreshed').innerHTML = `Last refreshed: ${new Date().toLocaleTimeString()}`;
    }

    function refreshXPosts() { loadXPosts(); }

    function loadUpcoming() {
      const container = document.getElementById('upcoming-grid');
      const upcomingGames = [
        { name: "Kingdom Come: Deliverance II", url: "https://store.steampowered.com/app/1771300/Kingdom_Come_Deliverance_II/", img: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1771300/capsule_616x353.jpg" },
        { name: "Gray Zone Warfare", url: "https://store.steampowered.com/app/2475740/Gray_Zone_Warfare/", img: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/2475740/capsule_616x353.jpg" },
        { name: "STALKER 2: Heart of Chornobyl", url: "https://store.steampowered.com/app/1643320/STALKER_2_Heart_of_Chornobyl/", img: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1643320/capsule_616x353.jpg" },
        { name: "Arma Reforger", url: "https://store.steampowered.com/app/1874880/Arma_Reforger/", img: "https://shared.akamai.steamstatic.com/store_item_assets/steam/apps/1874880/capsule_616x353.jpg" }
      ];

      container.innerHTML = upcomingGames.map(game => `
        <a href="${game.url}" target="_blank" class="card block rounded-3xl overflow-hidden border border-[#333333] hover:border-[#ffcc00]">
          <img src="${game.img}" alt="${game.name}" class="w-full h-40 object-cover">
          <div class="p-6">
            <h4 class="font-bold text-lg neon-green">${game.name}</h4>
            <p class="text-sm text-[#cccccc] mt-2">View on Steam Store →</p>
          </div>
        </a>
      `).join('');
    }

    function refreshUpcoming() { loadUpcoming(); }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    // Initialize
    loadNews();
    loadXPosts();
    loadUpcoming();
    showTab(0);
  </script>
</body>
</html>
